<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marble Slide Roller</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #101722;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      z-index: 10;
      top: 16px;
      left: 16px;
      width: min(340px, calc(100vw - 32px));
      box-sizing: border-box;
      padding: 14px 16px;
      color: rgba(250, 253, 255, 0.94);
      background: rgba(10, 16, 24, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
      user-select: none;
    }

    #hudHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #hud h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    #hudToggle {
      width: 34px;
      min-width: 34px;
      min-height: 30px;
      padding: 0;
      font-size: 20px;
      line-height: 1;
    }

    #hudBody {
      margin-top: 8px;
    }

    #hud.minimized {
      width: auto;
      padding: 10px 12px;
    }

    #hud.minimized #hudBody {
      display: none;
    }

    #hud.minimized #hudToggle {
      width: 30px;
      min-width: 30px;
    }

    #hud p {
      margin: 5px 0;
      color: rgba(229, 239, 248, 0.8);
      font-size: 13px;
      line-height: 1.38;
    }

    #hud kbd {
      display: inline-block;
      min-width: 14px;
      margin-right: 3px;
      padding: 1px 5px;
      color: #fff;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 5px;
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-align: center;
    }

    #meters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin: 12px 0;
    }

    .meter {
      min-width: 0;
      padding: 9px 10px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 7px;
    }

    .meter strong {
      display: block;
      margin-bottom: 2px;
      color: #fff;
      font-size: 18px;
      line-height: 1.05;
    }

    .meter span {
      color: rgba(224, 236, 247, 0.72);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #speed {
      height: 6px;
      margin-top: 9px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 999px;
    }

    #speed > div {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #8ed0ff, #eaf66d);
      border-radius: inherit;
    }

    #actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    button {
      min-width: 0;
      min-height: 36px;
      padding: 8px 10px;
      color: #f9fbff;
      background: rgba(31, 44, 58, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 7px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: rgba(48, 66, 82, 0.94);
      border-color: rgba(163, 222, 255, 0.55);
    }

    #touchPad {
      position: fixed;
      z-index: 11;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      display: none;
      grid-template-columns: repeat(3, 56px);
      grid-template-rows: repeat(3, 56px);
      gap: 8px;
      padding: 10px;
      background: rgba(10, 16, 24, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      touch-action: none;
      user-select: none;
    }

    .touch-button {
      width: 56px;
      height: 56px;
      min-height: 56px;
      padding: 0;
      border-radius: 8px;
      font-size: 24px;
      line-height: 1;
      touch-action: none;
    }

    .touch-button[data-control="arrowup"] {
      grid-column: 2;
      grid-row: 1;
    }

    .touch-button[data-control="arrowleft"] {
      grid-column: 1;
      grid-row: 2;
    }

    .touch-button[data-control="arrowright"] {
      grid-column: 3;
      grid-row: 2;
    }

    .touch-button[data-control="arrowdown"] {
      grid-column: 2;
      grid-row: 3;
    }

    @media (pointer: coarse), (max-width: 760px) {
      #touchPad {
        display: grid;
      }
    }

    @media (max-width: 640px) {
      #hud {
        top: 10px;
        left: 10px;
        right: 10px;
        width: auto;
        padding: 12px;
      }

      #hud h1 {
        font-size: 16px;
      }

      #hud p {
        font-size: 12px;
      }

      #touchPad {
        right: 10px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        grid-template-columns: repeat(3, 48px);
        grid-template-rows: repeat(3, 48px);
        gap: 7px;
        padding: 9px;
      }

      .touch-button {
        width: 48px;
        height: 48px;
        min-height: 48px;
        font-size: 22px;
      }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js",
        "three/addons/controls/OrbitControls.js": "./vendor/OrbitControls.js",
        "@dimforge/rapier3d-compat": "./vendor/rapier3d-compat.js"
      }
    }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hudHeader">
      <h1>Marble Slide Roller</h1>
      <button id="hudToggle" type="button" aria-label="Minimize panel" aria-expanded="true">-</button>
    </div>
    <div id="hudBody">
      <p><kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> roll relative to camera. <kbd>Mouse</kbd> orbit. <kbd>R</kbd> reset.</p>
      <p>Stay in the generated slide and cross the finish ring.</p>
      <div id="meters">
        <div class="meter"><strong id="progress">0%</strong><span>progress</span></div>
        <div class="meter"><strong id="fps">0</strong><span>fps</span></div>
      </div>
      <div id="speed"><div></div></div>
      <div id="actions">
        <button id="resetBall" type="button">Reset Ball</button>
        <button id="newRun" type="button">New Slide</button>
      </div>
    </div>
  </div>
  <div id="touchPad" aria-label="Touch roll controls">
    <button class="touch-button" type="button" data-control="arrowup" aria-label="Roll forward">↑</button>
    <button class="touch-button" type="button" data-control="arrowleft" aria-label="Roll left">←</button>
    <button class="touch-button" type="button" data-control="arrowright" aria-label="Roll right">→</button>
    <button class="touch-button" type="button" data-control="arrowdown" aria-label="Roll backward">↓</button>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { EXRLoader } from "./vendor/loaders/EXRLoader.js";
    import RAPIER from "@dimforge/rapier3d-compat";

    await RAPIER.init();

    const WORLD_UP = new THREE.Vector3(0, 1, 0);
    const FALLBACK_UP = new THREE.Vector3(1, 0, 0);
    const SLIDE_HORIZONTAL_SCALE = 2.08;
    const SLIDE_BLOCK_THICKNESS = 0.58;
    const SLIDE_SIDE_SKIRT_DEPTH = 1.52;
    const SLIDE_SIDE_SKIRT_FLARE = 0.2;
    const CONTACT_SHADOW_SURFACE_BIAS = 0.028;
    const GUARDRAIL_HEIGHT = 0.62;
    const GUARDRAIL_OUTSET = 0.24;
    const GUARDRAIL_RADIUS = 0.13;
    const GUARDRAIL_POST_RADIUS = 0.045;
    const SLIDE_REFLECTION_RESOLUTION = 256;
    const SLIDE_REFLECTION_INTERVAL = 2;
    let skyReflectionBackground = null;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xb9d8ee);
    scene.fog = new THREE.Fog(0xb9d8ee, 70, 230);

    const camera = new THREE.PerspectiveCamera(56, innerWidth / innerHeight, 0.1, 900);
    camera.position.set(9, 8, -13);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.065;
    controls.minDistance = 4;
    controls.maxDistance = 34;
    controls.maxPolarAngle = Math.PI * 0.58;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x516272, 2.15));

    const sunOffset = new THREE.Vector3(-22, 34, 14);
    const sunTarget = new THREE.Object3D();
    scene.add(sunTarget);

    const sun = new THREE.DirectionalLight(0xffffff, 3.0);
    sun.position.copy(sunOffset);
    sun.target = sunTarget;
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.bias = -0.00012;
    sun.shadow.normalBias = 0.035;
    sun.shadow.camera.near = 0.5;
    sun.shadow.camera.far = 105;
    sun.shadow.camera.left = -32;
    sun.shadow.camera.right = 32;
    sun.shadow.camera.top = 32;
    sun.shadow.camera.bottom = -32;
    scene.add(sun);

    const world = new RAPIER.World({ x: 0, y: -9.81, z: 0 });
    world.timestep = 1 / 60;

    await addSkySphere();

    const slideProfile = [
      [-2.88, 1.68],
      [-2.80, 1.42],
      [-2.64, 1.12],
      [-2.40, 0.80],
      [-2.08, 0.50],
      [-1.70, 0.24],
      [-1.28, 0.04],
      [-0.86, -0.10],
      [-0.43, -0.19],
      [0.00, -0.22],
      [0.43, -0.19],
      [0.86, -0.10],
      [1.28, 0.04],
      [1.70, 0.24],
      [2.08, 0.50],
      [2.40, 0.80],
      [2.64, 1.12],
      [2.80, 1.42],
      [2.88, 1.68]
    ].map(([x, y]) => new THREE.Vector2(x, y));

    const tileDefs = {
      straight: {
        color: 0x16a8e0,
        build: () => makeStraight({ length: 10, drop: 0.5, segments: 28 })
      },
      drop: {
        color: 0x2d65ce,
        build: () => makeStraight({ length: 11, drop: 4.2, segments: 34 })
      },
      dip: {
        color: 0x3fb6d5,
        build: () => makeDip({ length: 12, depth: 1.2, drop: 1.3, segments: 42 })
      },
      left45: {
        color: 0x18ad95,
        build: () => makeTurn({ sign: -1, angle: Math.PI / 4, radius: 9, drop: 0.6, bank: THREE.MathUtils.degToRad(8), segments: 34 })
      },
      right45: {
        color: 0x18ad95,
        build: () => makeTurn({ sign: 1, angle: Math.PI / 4, radius: 9, drop: 0.6, bank: THREE.MathUtils.degToRad(8), segments: 34 })
      },
      left90: {
        color: 0x28b85e,
        build: () => makeTurn({ sign: -1, angle: Math.PI / 2, radius: 10, drop: 1.2, bank: THREE.MathUtils.degToRad(13), segments: 54 })
      },
      right90: {
        color: 0x28b85e,
        build: () => makeTurn({ sign: 1, angle: Math.PI / 2, radius: 10, drop: 1.2, bank: THREE.MathUtils.degToRad(13), segments: 54 })
      },
      bankLeft: {
        color: 0xe59a25,
        build: () => makeTurn({ sign: -1, angle: Math.PI / 2, radius: 11, drop: 2.3, bank: THREE.MathUtils.degToRad(25), segments: 58 })
      },
      bankRight: {
        color: 0xe59a25,
        build: () => makeTurn({ sign: 1, angle: Math.PI / 2, radius: 11, drop: 2.3, bank: THREE.MathUtils.degToRad(25), segments: 58 })
      },
      corkscrew: {
        color: 0x8c65c8,
        build: () => makeTwisty({ length: 15, sway: 3.0, drop: 2.4, bank: THREE.MathUtils.degToRad(18), segments: 58 })
      }
    };

    const slideGroup = new THREE.Group();
    scene.add(slideGroup);

    const physicsObjects = [];
    const trackPieces = [];
    const trackSamples = [];
    const slideReflectionMeshes = [];
    const tempMatrix = new THREE.Matrix4();
    const tempVec = new THREE.Vector3();
    const tempQuat = new THREE.Quaternion();
    const tempScale = new THREE.Vector3();
    const slideReflectionTarget = new THREE.WebGLCubeRenderTarget(SLIDE_REFLECTION_RESOLUTION, {
      type: THREE.HalfFloatType,
      generateMipmaps: true,
      minFilter: THREE.LinearMipmapLinearFilter
    });
    const slideReflectionCamera = new THREE.CubeCamera(0.08, 900, slideReflectionTarget);
    const SLIDE_TEXTURE_ROTATION = Math.PI / 2;
    const slidePbrMaps = await loadSlidePbrMaps();
    const ballPbrMaps = await loadBallPbrMaps();

    let activeSocket = new THREE.Matrix4().identity();
    let totalTrackLength = 0;
    let fallResetY = -60;
    let runStartedAt = performance.now();
    let finished = false;
    let finishRing;
    let startInfo;
    let reflectionFrame = 0;

    const supportMaterial = new THREE.MeshStandardMaterial({ color: 0x384e5a, roughness: 0.68, metalness: 0.1 });
    const guardrailMaterial = new THREE.MeshStandardMaterial({ color: 0x111820, roughness: 0.34, metalness: 0.04 });
    const guardrailPostMaterial = new THREE.MeshStandardMaterial({ color: 0x8b9aa2, roughness: 0.5, metalness: 0.28 });
    [supportMaterial, guardrailMaterial, guardrailPostMaterial].forEach((material) => {
      material.userData.reusable = true;
    });

    const ballRadius = 0.62;
    const ballBody = world.createRigidBody(
      RAPIER.RigidBodyDesc.dynamic()
        .setTranslation(0, 3, 0)
        .setLinearDamping(0.12)
        .setAngularDamping(0.34)
        .setCcdEnabled(true)
    );
    world.createCollider(
      RAPIER.ColliderDesc.ball(ballRadius)
        .setDensity(1.25)
        .setFriction(1.55)
        .setRestitution(0.06),
      ballBody
    );

    const ballMesh = new THREE.Mesh(
      new THREE.SphereGeometry(ballRadius, 64, 32),
      makeBallMaterial()
    );
    ballMesh.castShadow = true;
    ballMesh.receiveShadow = true;
    scene.add(ballMesh);
    physicsObjects.push({ body: ballBody, mesh: ballMesh });

    const ballContactShadow = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      new THREE.MeshBasicMaterial({
        color: 0x000000,
        map: makeContactShadowTexture(),
        transparent: true,
        opacity: 0,
        depthWrite: false,
        polygonOffset: true,
        polygonOffsetFactor: -1,
        polygonOffsetUnits: -1,
        side: THREE.DoubleSide
      })
    );
    ballContactShadow.renderOrder = 2;
    scene.add(ballContactShadow);

    const keys = new Set();
    const touchControls = new Set();
    const speedFill = document.querySelector("#speed > div");
    const progressEl = document.getElementById("progress");
    const fpsEl = document.getElementById("fps");
    const hud = document.getElementById("hud");
    const hudToggle = document.getElementById("hudToggle");
    const fixedDt = 1 / 60;
    const ballPosition = new THREE.Vector3();
    const desiredCameraPosition = new THREE.Vector3();
    const cameraFollowDelta = new THREE.Vector3();
    const cameraOffset = new THREE.Vector3(8, 5.8, -10);
    let accumulator = 0;
    let previousFrameTime = performance.now();
    let fpsAverage = 0;
    let previousFpsDisplayTime = previousFrameTime;

    addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (["arrowup", "arrowdown", "arrowleft", "arrowright", "r"].includes(key)) {
        event.preventDefault();
      }
      keys.add(key);
      if (key === "r") resetBall();
    }, { passive: false });
    addEventListener("keyup", (event) => keys.delete(event.key.toLowerCase()));

    document.getElementById("resetBall").addEventListener("click", resetBall);
    document.getElementById("newRun").addEventListener("click", generateNewSlide);
    hudToggle.addEventListener("click", () => {
      const minimized = hud.classList.toggle("minimized");
      hudToggle.textContent = minimized ? "+" : "-";
      hudToggle.setAttribute("aria-expanded", String(!minimized));
      hudToggle.setAttribute("aria-label", minimized ? "Expand panel" : "Minimize panel");
    });

    document.querySelectorAll(".touch-button").forEach((button) => {
      const control = button.dataset.control;
      const press = (event) => {
        event.preventDefault();
        touchControls.add(control);
        button.setPointerCapture?.(event.pointerId);
      };
      const release = (event) => {
        event.preventDefault();
        touchControls.delete(control);
        if (button.hasPointerCapture?.(event.pointerId)) {
          button.releasePointerCapture(event.pointerId);
        }
      };

      button.addEventListener("pointerdown", press);
      button.addEventListener("pointerup", release);
      button.addEventListener("pointercancel", release);
      button.addEventListener("lostpointercapture", () => touchControls.delete(control));
    });

    function makeStraight({ length, drop, segments }) {
      const samples = [];
      for (let i = 0; i <= segments; i++) {
        const u = i / segments;
        const vertical = smoothStep(u);
        const verticalDerivative = smoothStepDerivative(u);
        samples.push({
          p: new THREE.Vector3(0, -drop * vertical, length * u),
          tangent: new THREE.Vector3(0, -drop * verticalDerivative, length).normalize(),
          upHint: WORLD_UP,
          roll: 0
        });
      }
      return createTileFromSamples(samples);
    }

    function makeDip({ length, depth, drop, segments }) {
      const samples = [];
      for (let i = 0; i <= segments; i++) {
        const u = i / segments;
        const bowl = Math.sin(Math.PI * u);
        const bowlDerivative = Math.PI * Math.cos(Math.PI * u);
        const vertical = smoothStep(u);
        const verticalDerivative = smoothStepDerivative(u);
        samples.push({
          p: new THREE.Vector3(0, -drop * vertical - depth * bowl, length * u),
          tangent: new THREE.Vector3(0, -drop * verticalDerivative - depth * bowlDerivative, length).normalize(),
          upHint: WORLD_UP,
          roll: 0
        });
      }
      return createTileFromSamples(samples);
    }

    function makeTurn({ sign, angle, radius, drop, bank, segments }) {
      const samples = [];
      for (let i = 0; i <= segments; i++) {
        const u = i / segments;
        const theta = angle * u;
        const vertical = smoothStep(u);
        const verticalDerivative = smoothStepDerivative(u);
        const p = new THREE.Vector3(
          sign * radius * (1 - Math.cos(theta)),
          -drop * vertical,
          radius * Math.sin(theta)
        );
        const tangent = new THREE.Vector3(
          sign * radius * angle * Math.sin(theta),
          -drop * verticalDerivative,
          radius * angle * Math.cos(theta)
        ).normalize();
        const roll = sign * bank * Math.sin(Math.PI * u);
        samples.push({ p, tangent, upHint: WORLD_UP, roll });
      }
      return createTileFromSamples(samples);
    }

    function makeTwisty({ length, sway, drop, bank, segments }) {
      const samples = [];
      for (let i = 0; i <= segments; i++) {
        const u = i / segments;
        const phase = u * Math.PI * 2;
        const side = Math.sin(phase) * Math.sin(Math.PI * u);
        const sideDerivative =
          Math.cos(phase) * Math.PI * 2 * Math.sin(Math.PI * u) +
          Math.sin(phase) * Math.PI * Math.cos(Math.PI * u);
        const vertical = smoothStep(u);
        const verticalDerivative = smoothStepDerivative(u);
        const p = new THREE.Vector3(side * sway, -drop * vertical, length * u);
        const tangent = new THREE.Vector3(sideDerivative * sway, -drop * verticalDerivative, length).normalize();
        const roll = Math.sin(phase) * bank;
        samples.push({ p, tangent, upHint: WORLD_UP, roll });
      }
      return createTileFromSamples(samples);
    }

    function createTileFromSamples(samples) {
      samples = scaleSlideSamples(samples);
      const geometry = buildSweptSlideGeometry(samples, slideProfile, { capStart: false, capEnd: false });
      return {
        geometry,
        samples,
        startSocket: new THREE.Matrix4().identity(),
        endSocket: matrixFromSample(samples[samples.length - 1]),
        length: estimateSampleLength(samples)
      };
    }

    function scaleSlideSamples(samples) {
      const scaledSamples = samples.map((sample) => ({
        p: new THREE.Vector3(
          sample.p.x * SLIDE_HORIZONTAL_SCALE,
          sample.p.y,
          sample.p.z * SLIDE_HORIZONTAL_SCALE
        ),
        tangent: sample.tangent.clone(),
        upHint: sample.upHint.clone(),
        roll: sample.roll
      }));

      for (let i = 0; i < scaledSamples.length; i++) {
        const previous = scaledSamples[Math.max(0, i - 1)].p;
        const next = scaledSamples[Math.min(scaledSamples.length - 1, i + 1)].p;
        const tangent = next.clone().sub(previous);
        if (tangent.lengthSq() > 0.000001) {
          scaledSamples[i].tangent.copy(tangent.normalize());
        } else {
          scaledSamples[i].tangent.set(
            samples[i].tangent.x * SLIDE_HORIZONTAL_SCALE,
            samples[i].tangent.y,
            samples[i].tangent.z * SLIDE_HORIZONTAL_SCALE
          ).normalize();
        }
      }

      return scaledSamples;
    }

    function buildSweptSlideGeometry(samples, profile, options = {}) {
      const rows = samples.map((sample) => {
        const frame = getFrame(sample.tangent, sample.upHint, sample.roll);
        return {
          point: sample.p,
          right: frame.right,
          up: frame.up,
          forward: frame.forward,
          distance: 0
        };
      });

      for (let i = 1; i < rows.length; i++) {
        rows[i].distance = rows[i - 1].distance + rows[i].point.distanceTo(rows[i - 1].point);
      }

      return buildSweptSlideGeometryFromRows(rows, profile, options);
    }

    function buildSweptSlideGeometryFromRows(trackRows, profile, { capStart = true, capEnd = true } = {}) {
      const rows = trackRows.length;
      const cols = profile.length;
      const bottomOffset = rows * cols;
      const positions = [];
      const uvs = [];
      const indices = [];
      const startDistance = trackRows[0].distance ?? 0;
      const endDistance = trackRows[rows - 1].distance ?? 0;
      const totalDistance = Math.max(endDistance - startDistance, 0.0001);

      for (let i = 0; i < rows; i++) {
        const row = trackRows[i];
        const u = ((row.distance ?? startDistance) - startDistance) / totalDistance;
        for (let j = 0; j < cols; j++) {
          const point = profile[j];
          const vertex = row.point.clone()
            .addScaledVector(row.right, point.x * SLIDE_HORIZONTAL_SCALE)
            .addScaledVector(row.up, point.y);
          positions.push(vertex.x, vertex.y, vertex.z);
          uvs.push(u * totalDistance * 0.16, (j / (cols - 1)) * SLIDE_HORIZONTAL_SCALE);
        }
      }

      for (let i = 0; i < rows; i++) {
        const row = trackRows[i];
        const u = ((row.distance ?? startDistance) - startDistance) / totalDistance;
        for (let j = 0; j < cols; j++) {
          const point = profile[j];
          const vertex = row.point.clone()
            .addScaledVector(row.right, point.x * SLIDE_HORIZONTAL_SCALE)
            .addScaledVector(row.up, point.y - SLIDE_BLOCK_THICKNESS);
          positions.push(vertex.x, vertex.y, vertex.z);
          uvs.push(u * totalDistance * 0.16, (j / (cols - 1)) * SLIDE_HORIZONTAL_SCALE);
        }
      }

      for (let i = 0; i < rows - 1; i++) {
        for (let j = 0; j < cols - 1; j++) {
          const a = i * cols + j;
          const b = (i + 1) * cols + j;
          const c = i * cols + j + 1;
          const d = (i + 1) * cols + j + 1;
          const ba = bottomOffset + a;
          const bb = bottomOffset + b;
          const bc = bottomOffset + c;
          const bd = bottomOffset + d;
          indices.push(a, b, c, c, b, d);
          indices.push(ba, bc, bb, bc, bd, bb);
        }
      }

      for (let i = 0; i < rows - 1; i++) {
        const topLeftA = i * cols;
        const topLeftB = (i + 1) * cols;
        const bottomLeftA = bottomOffset + topLeftA;
        const bottomLeftB = bottomOffset + topLeftB;
        indices.push(topLeftA, bottomLeftA, topLeftB, topLeftB, bottomLeftA, bottomLeftB);

        const topRightA = i * cols + cols - 1;
        const topRightB = (i + 1) * cols + cols - 1;
        const bottomRightA = bottomOffset + topRightA;
        const bottomRightB = bottomOffset + topRightB;
        indices.push(topRightA, topRightB, bottomRightA, topRightB, bottomRightB, bottomRightA);
      }

      if (capStart) {
        for (let j = 0; j < cols - 1; j++) {
          const startA = j;
          const startB = j + 1;
          const startBottomA = bottomOffset + startA;
          const startBottomB = bottomOffset + startB;
          indices.push(startA, startB, startBottomA, startB, startBottomB, startBottomA);
        }
      }

      if (capEnd) {
        for (let j = 0; j < cols - 1; j++) {
          const endA = (rows - 1) * cols + j;
          const endB = endA + 1;
          const endBottomA = bottomOffset + endA;
          const endBottomB = bottomOffset + endB;
          indices.push(endA, endBottomA, endB, endB, endBottomA, endBottomB);
        }
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      geometry.computeBoundingBox();
      geometry.computeBoundingSphere();
      return geometry;
    }

    function getFrame(tangentInput, upHintInput = WORLD_UP, roll = 0) {
      const forward = tangentInput.clone().normalize();
      let upHint = upHintInput.clone().normalize();
      if (Math.abs(forward.dot(upHint)) > 0.985) {
        upHint = FALLBACK_UP.clone();
      }
      const right = new THREE.Vector3().crossVectors(upHint, forward).normalize();
      const up = new THREE.Vector3().crossVectors(forward, right).normalize();
      if (roll !== 0) {
        const q = new THREE.Quaternion().setFromAxisAngle(forward, roll);
        right.applyQuaternion(q);
        up.applyQuaternion(q);
      }
      return { right, up, forward };
    }

    function matrixFromSample(sample) {
      const frame = getFrame(sample.tangent, sample.upHint, sample.roll);
      const m = new THREE.Matrix4();
      m.makeBasis(frame.right, frame.up, frame.forward);
      m.setPosition(sample.p);
      return m;
    }

    function estimateSampleLength(samples) {
      let length = 0;
      for (let i = 1; i < samples.length; i++) {
        length += samples[i].p.distanceTo(samples[i - 1].p);
      }
      return length;
    }

    function smoothStep(u) {
      return u * u * (3 - 2 * u);
    }

    function smoothStepDerivative(u) {
      return 6 * u * (1 - u);
    }

    function generateNewSlide() {
      clearSlide();
      activeSocket.identity();
      totalTrackLength = 0;

      const chain = makeGeneratedChain();
      for (const id of chain) {
        addSlideTile(id);
      }

      fallResetY = getLowestTrackPointY() - 45;
      addContinuousSlideSurface();
      addSupports();
      addFinishRing();
      resetBall();
      frameCameraToBall(true);
    }

    function makeGeneratedChain() {
      const turnPairs = [
        ["left45", "right45"],
        ["right45", "left45"],
        ["left90", "right45"],
        ["right90", "left45"],
        ["bankLeft", "right45"],
        ["bankRight", "left45"],
        ["corkscrew", "drop"],
        ["dip", "straight"]
      ];
      const chain = ["straight", "drop"];
      for (let i = 0; i < 7; i++) {
        const pair = turnPairs[Math.floor(Math.random() * turnPairs.length)];
        chain.push(...pair);
        if (i % 2 === 0) chain.push(Math.random() > 0.45 ? "drop" : "straight");
      }
      chain.push("dip", "straight");
      return chain;
    }

    function clearSlide() {
      while (slideGroup.children.length) {
        const child = slideGroup.children.pop();
        disposeObject(child);
      }

      for (const piece of trackPieces) {
        if (piece.collider) world.removeCollider(piece.collider, true);
        if (piece.body) world.removeRigidBody(piece.body);
        piece.geometry?.dispose();
      }
      trackPieces.length = 0;
      trackSamples.length = 0;
      slideReflectionMeshes.length = 0;
      finishRing = null;
      startInfo = null;
      fallResetY = -60;
    }

    function addSlideTile(id) {
      const def = tileDefs[id];
      const tile = def.build();
      const placement = activeSocket.clone().multiply(tile.startSocket.clone().invert());

      const trackPlacements = tile.samples.map((sample) => makeTrackPlacementFromMatrix(placement, sample));
      const centerPoints = trackPlacements.map((trackPlacement) => trackPlacement.center);

      const { vertices, indices } = geometryToTrimesh(tile.geometry);
      placement.decompose(tempVec, tempQuat, tempScale);
      const body = world.createRigidBody(
        RAPIER.RigidBodyDesc.fixed()
          .setTranslation(tempVec.x, tempVec.y, tempVec.z)
          .setRotation({ x: tempQuat.x, y: tempQuat.y, z: tempQuat.z, w: tempQuat.w })
      );
      const collider = world.createCollider(
        RAPIER.ColliderDesc.trimesh(vertices, indices)
          .setFriction(1.28)
          .setRestitution(0.03),
        body
      );

      let distance = totalTrackLength;
      for (const trackPlacement of trackPlacements) {
        const point = trackPlacement.center;
        if (trackSamples.length > 0) {
          distance += point.distanceTo(trackSamples[trackSamples.length - 1].point);
        }
        trackSamples.push({
          point,
          distance,
          right: trackPlacement.right,
          up: trackPlacement.up,
          forward: trackPlacement.forward
        });
      }

      const endSocketWorld = placement.clone().multiply(tile.endSocket);
      trackPieces.push({ id, geometry: tile.geometry, body, collider, endSocketWorld, placement, length: tile.length });
      activeSocket.copy(endSocketWorld);
      totalTrackLength += tile.length;

      if (!startInfo) {
        startInfo = makeTrackPlacementFromMatrix(placement, tile.samples[0]);
      }
    }

    function addContinuousSlideSurface() {
      const rows = makeUniqueTrackRows();
      if (rows.length < 2) return;

      const geometry = buildSweptSlideGeometryFromRows(rows, slideProfile, { capStart: true, capEnd: true });
      const mesh = new THREE.Mesh(geometry, makeSlideMaterial());
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      slideGroup.add(mesh);
      slideReflectionMeshes.push(mesh);

      const skirt = new THREE.Mesh(buildSlideSkirtGeometry(rows, slideProfile), makeSlideMaterial());
      skirt.castShadow = true;
      skirt.receiveShadow = true;
      slideGroup.add(skirt);
      slideReflectionMeshes.push(skirt);

      addSlideGuardrails(rows);
    }

    function makeUniqueTrackRows() {
      const rows = [];
      for (const sample of trackSamples) {
        if (rows.length > 0 && sample.point.distanceToSquared(rows[rows.length - 1].point) < 0.000001) {
          rows[rows.length - 1] = sample;
          continue;
        }
        rows.push(sample);
      }
      return rows;
    }

    function buildSlideSkirtGeometry(rows, profile) {
      const positions = [];
      const uvs = [];
      const indices = [];
      const leftProfile = profile[0];
      const rightProfile = profile[profile.length - 1];
      const startDistance = rows[0].distance ?? 0;

      for (let i = 0; i < rows.length; i++) {
        const row = rows[i];
        const u = ((row.distance ?? startDistance) - startDistance) * 0.16;
        const leftTop = row.point.clone()
          .addScaledVector(row.right, leftProfile.x * SLIDE_HORIZONTAL_SCALE)
          .addScaledVector(row.up, leftProfile.y);
        const rightTop = row.point.clone()
          .addScaledVector(row.right, rightProfile.x * SLIDE_HORIZONTAL_SCALE)
          .addScaledVector(row.up, rightProfile.y);
        const leftBottom = leftTop.clone()
          .addScaledVector(row.right, -SLIDE_SIDE_SKIRT_FLARE)
          .addScaledVector(row.up, -SLIDE_SIDE_SKIRT_DEPTH);
        const rightBottom = rightTop.clone()
          .addScaledVector(row.right, SLIDE_SIDE_SKIRT_FLARE)
          .addScaledVector(row.up, -SLIDE_SIDE_SKIRT_DEPTH);

        positions.push(
          leftTop.x, leftTop.y, leftTop.z,
          leftBottom.x, leftBottom.y, leftBottom.z,
          rightTop.x, rightTop.y, rightTop.z,
          rightBottom.x, rightBottom.y, rightBottom.z
        );
        uvs.push(
          u, 0,
          u, SLIDE_SIDE_SKIRT_DEPTH,
          u, 0,
          u, SLIDE_SIDE_SKIRT_DEPTH
        );
      }

      for (let i = 0; i < rows.length - 1; i++) {
        const a = i * 4;
        const b = (i + 1) * 4;
        indices.push(
          a, a + 1, b,
          b, a + 1, b + 1,
          a + 2, b + 2, a + 3,
          b + 2, b + 3, a + 3
        );
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute("uv", new THREE.Float32BufferAttribute(uvs, 2));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      geometry.computeBoundingBox();
      geometry.computeBoundingSphere();
      return geometry;
    }

    function addSlideGuardrails(rows) {
      const leftProfile = slideProfile[0];
      const rightProfile = slideProfile[slideProfile.length - 1];
      addGuardrailSide(rows, leftProfile, -1);
      addGuardrailSide(rows, rightProfile, 1);
    }

    function addGuardrailSide(rows, edgeProfile, sideSign) {
      const railPoints = rows.map((row) => makeGuardrailPoint(row, edgeProfile, sideSign, GUARDRAIL_HEIGHT, GUARDRAIL_OUTSET));
      const railCurve = new THREE.CatmullRomCurve3(railPoints, false, "centripetal", 0.2);
      const rail = new THREE.Mesh(
        new THREE.TubeGeometry(railCurve, Math.max(96, rows.length), GUARDRAIL_RADIUS, 14, false),
        guardrailMaterial
      );
      rail.castShadow = true;
      rail.receiveShadow = true;
      slideGroup.add(rail);

      const postStride = Math.max(14, Math.floor(rows.length / 34));
      for (let i = 0; i < rows.length; i += postStride) {
        const row = rows[i];
        const base = makeGuardrailPoint(row, edgeProfile, sideSign, 0.08, GUARDRAIL_OUTSET * 0.48);
        const top = makeGuardrailPoint(row, edgeProfile, sideSign, GUARDRAIL_HEIGHT - GUARDRAIL_RADIUS * 0.4, GUARDRAIL_OUTSET);
        const post = makeCylinderBetween(base, top, GUARDRAIL_POST_RADIUS, guardrailPostMaterial, 8);
        slideGroup.add(post);
      }
    }

    function makeGuardrailPoint(row, edgeProfile, sideSign, lift, outset) {
      return row.point.clone()
        .addScaledVector(row.right, edgeProfile.x * SLIDE_HORIZONTAL_SCALE + sideSign * outset)
        .addScaledVector(row.up, edgeProfile.y + lift);
    }

    function makeCylinderBetween(start, end, radius, material, radialSegments = 10) {
      const direction = end.clone().sub(start);
      const length = direction.length();
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, length, radialSegments),
        material
      );
      mesh.position.copy(start).add(end).multiplyScalar(0.5);
      mesh.quaternion.setFromUnitVectors(WORLD_UP, direction.normalize());
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function geometryToTrimesh(geometry) {
      const position = geometry.getAttribute("position");
      const vertices = new Float32Array(position.count * 3);
      for (let i = 0; i < position.count; i++) {
        vertices[i * 3] = position.getX(i);
        vertices[i * 3 + 1] = position.getY(i);
        vertices[i * 3 + 2] = position.getZ(i);
      }

      const sourceIndex = geometry.index.array;
      const indices = new Uint32Array(sourceIndex.length);
      for (let i = 0; i < sourceIndex.length; i++) {
        indices[i] = sourceIndex[i];
      }
      return { vertices, indices };
    }

    function addSupports() {
      const stride = Math.max(10, Math.floor(trackSamples.length / 24));
      for (let i = 0; i < trackSamples.length; i += stride) {
        const point = trackSamples[i].point;
        const height = Math.max(0.8, point.y + 5.2);
        if (height < 1.3) continue;

        const support = new THREE.Mesh(
          new THREE.CylinderGeometry(0.12, 0.2, height, 10),
          supportMaterial
        );
        support.position.set(point.x, point.y - height / 2 - 0.55, point.z);
        support.castShadow = true;
        support.receiveShadow = true;
        slideGroup.add(support);
      }
    }

    function getLowestTrackPointY() {
      if (trackSamples.length === 0) return -15;
      let lowest = Infinity;
      for (const sample of trackSamples) {
        lowest = Math.min(lowest, sample.point.y);
      }
      return lowest;
    }

    function addFinishRing() {
      const lastPiece = trackPieces[trackPieces.length - 1];
      const lastTile = tileDefs[lastPiece.id].build();
      const sample = lastTile.samples[lastTile.samples.length - 1];
      const frameInfo = makeTrackPlacementFromMatrix(lastPiece.placement, sample);

      finishRing = new THREE.Mesh(
        new THREE.TorusGeometry(2.9 * SLIDE_HORIZONTAL_SCALE, 0.08, 16, 96),
        new THREE.MeshStandardMaterial({
          color: 0xf6f08a,
          emissive: 0x302800,
          roughness: 0.35
        })
      );
      finishRing.position.copy(frameInfo.center).addScaledVector(frameInfo.up, 0.55);
      finishRing.quaternion.setFromRotationMatrix(tempMatrix.makeBasis(frameInfo.right, frameInfo.up, frameInfo.forward));
      finishRing.castShadow = true;
      slideGroup.add(finishRing);
    }

    function makeTrackPlacementFromMatrix(placement, sample) {
      const frame = getFrame(sample.tangent, sample.upHint, sample.roll);
      const center = sample.p.clone().applyMatrix4(placement);
      const right = frame.right.clone().transformDirection(placement);
      const up = frame.up.clone().transformDirection(placement);
      const forward = frame.forward.clone().transformDirection(placement);
      return { center, right, up, forward };
    }

    function resetBall() {
      const info = startInfo || {
        center: new THREE.Vector3(),
        up: WORLD_UP.clone(),
        forward: new THREE.Vector3(0, 0, 1)
      };
      const spawn = info.center.clone()
        .addScaledVector(info.up, ballRadius + 0.2)
        .addScaledVector(info.forward, 0.25);

      ballBody.setTranslation({ x: spawn.x, y: spawn.y, z: spawn.z }, true);
      ballBody.setRotation({ x: 0, y: 0, z: 0, w: 1 }, true);
      ballBody.setLinvel({ x: 0, y: 0, z: 0 }, true);
      ballBody.setAngvel({ x: 0, y: 0, z: 0 }, true);
      ballPosition.copy(spawn);
      runStartedAt = performance.now();
      finished = false;
    }

    const up = new THREE.Vector3(0, 1, 0);
    const desiredMove = new THREE.Vector3();
    const forward = new THREE.Vector3();
    const right = new THREE.Vector3();
    const torqueAxis = new THREE.Vector3();

    generateNewSlide();
    animate();

    function applyBallControls(dt) {
      desiredMove.set(0, 0, 0);

      camera.getWorldDirection(forward);
      forward.y = 0;
      if (forward.lengthSq() < 0.0001) forward.set(0, 0, 1);
      forward.normalize();
      right.crossVectors(forward, up).normalize();

      if (keys.has("arrowup") || touchControls.has("arrowup")) desiredMove.add(forward);
      if (keys.has("arrowdown") || touchControls.has("arrowdown")) desiredMove.sub(forward);
      if (keys.has("arrowright") || touchControls.has("arrowright")) desiredMove.add(right);
      if (keys.has("arrowleft") || touchControls.has("arrowleft")) desiredMove.sub(right);

      if (desiredMove.lengthSq() === 0) return;
      desiredMove.normalize();

      const velocity = ballBody.linvel();
      const horizontalSpeed = Math.hypot(velocity.x, velocity.z);
      const maxSpeed = 16.5;
      const drive = horizontalSpeed < maxSpeed ? 9.8 : 2.35;

      torqueAxis.crossVectors(up, desiredMove).normalize();
      ballBody.applyTorqueImpulse({
        x: torqueAxis.x * drive * dt,
        y: torqueAxis.y * drive * dt,
        z: torqueAxis.z * drive * dt
      }, true);

      ballBody.applyImpulse({
        x: desiredMove.x * 0.018 * dt,
        y: 0,
        z: desiredMove.z * 0.018 * dt
      }, true);
    }

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      const frameDt = Math.min((now - previousFrameTime) / 1000, 0.05);
      previousFrameTime = now;
      if (frameDt > 0) {
        const instantFps = 1 / frameDt;
        fpsAverage = fpsAverage === 0 ? instantFps : THREE.MathUtils.lerp(fpsAverage, instantFps, 0.08);
        if (now - previousFpsDisplayTime > 250) {
          fpsEl.textContent = `${Math.round(fpsAverage)}`;
          previousFpsDisplayTime = now;
        }
      }
      accumulator += frameDt;

      while (accumulator >= fixedDt) {
        applyBallControls(fixedDt);
        world.step();
        accumulator -= fixedDt;
      }

      for (const object of physicsObjects) {
        const t = object.body.translation();
        const r = object.body.rotation();
        object.mesh.position.set(t.x, t.y, t.z);
        object.mesh.quaternion.set(r.x, r.y, r.z, r.w);
      }

      const t = ballBody.translation();
      ballPosition.set(t.x, t.y, t.z);
      if (t.y < fallResetY) resetBall();
      updateSunShadowTarget();
      updateBallContactShadow();

      const progress = estimateProgress(ballPosition);
      if (!finished && progress > 0.985) {
        finished = true;
      }

      frameCameraToBall(false);
      controls.update();

      const v = ballBody.linvel();
      const speedPct = Math.min(100, (Math.hypot(v.x, v.z) / 16.5) * 100);
      speedFill.style.width = `${speedPct}%`;
      progressEl.textContent = `${Math.round(progress * 100)}%`;
      if (finished) progressEl.textContent = "Done";

      updateSlideReflection();
      renderer.render(scene, camera);
    }

    function updateSunShadowTarget() {
      sun.position.copy(ballPosition).add(sunOffset);
      sunTarget.position.copy(ballPosition);
      sunTarget.updateMatrixWorld();
    }

    function updateSlideReflection() {
      if (slideReflectionMeshes.length === 0) return;
      reflectionFrame = (reflectionFrame + 1) % SLIDE_REFLECTION_INTERVAL;
      if (reflectionFrame !== 0) return;

      slideReflectionCamera.position.copy(camera.position);

      const previousContactShadowVisibility = ballContactShadow.visible;
      ballContactShadow.visible = false;
      for (const mesh of slideReflectionMeshes) {
        mesh.visible = false;
      }

      const previousFog = scene.fog;
      const previousBackground = scene.background;
      if (skyReflectionBackground) scene.background = skyReflectionBackground;
      scene.fog = null;
      slideReflectionCamera.update(renderer, scene);
      scene.background = previousBackground;
      scene.fog = previousFog;

      for (const mesh of slideReflectionMeshes) {
        mesh.visible = true;
      }
      ballContactShadow.visible = previousContactShadowVisibility;
    }

    function updateBallContactShadow() {
      if (trackSamples.length === 0) {
        ballContactShadow.visible = false;
        return;
      }

      const closest = findClosestTrackSample(ballPosition, Math.max(1, Math.floor(trackSamples.length / 260)));
      if (!closest) {
        ballContactShadow.visible = false;
        return;
      }

      const surface = sampleSlideSurfaceUnderBall(closest, ballPosition);
      if (surface.lateralOverflow > ballRadius * 0.65) {
        ballContactShadow.visible = false;
        return;
      }
      const height = Math.abs(ballPosition.clone().sub(surface.point).dot(surface.normal));
      if (height < ballRadius * 0.68 || height > ballRadius + 1.25) {
        ballContactShadow.visible = false;
        return;
      }
      const opacity = THREE.MathUtils.clamp(0.42 * (1 - (height - ballRadius) / 1.1), 0, 0.42);
      ballContactShadow.visible = opacity > 0.015;
      ballContactShadow.material.opacity = opacity;
      ballContactShadow.position.copy(surface.point).addScaledVector(surface.normal, CONTACT_SHADOW_SURFACE_BIAS);
      ballContactShadow.quaternion.setFromRotationMatrix(
        tempMatrix.makeBasis(surface.widthTangent, closest.forward, surface.normal)
      );
      const spread = THREE.MathUtils.clamp(1.15 + (height - ballRadius) * 0.45, 1.15, 1.8);
      ballContactShadow.scale.set(ballRadius * 2.2 * spread, ballRadius * 1.45 * spread, 1);
    }

    function findClosestTrackSample(position, step = 1) {
      let closest = null;
      let closestDistanceSq = Infinity;
      for (let i = 0; i < trackSamples.length; i += step) {
        const sample = trackSamples[i];
        const d = sample.point.distanceToSquared(position);
        if (d < closestDistanceSq) {
          closestDistanceSq = d;
          closest = sample;
        }
      }
      return closest;
    }

    function sampleSlideSurfaceUnderBall(row, position) {
      const rawLateral = position.clone().sub(row.point).dot(row.right);
      const minLateral = slideProfile[0].x * SLIDE_HORIZONTAL_SCALE;
      const maxLateral = slideProfile[slideProfile.length - 1].x * SLIDE_HORIZONTAL_SCALE;
      const lateral = THREE.MathUtils.clamp(rawLateral, minLateral, maxLateral);
      const lateralOverflow = Math.max(minLateral - rawLateral, rawLateral - maxLateral, 0);
      const profileX = lateral / SLIDE_HORIZONTAL_SCALE;
      let left = slideProfile[0];
      let right = slideProfile[slideProfile.length - 1];

      for (let i = 0; i < slideProfile.length - 1; i++) {
        if (profileX >= slideProfile[i].x && profileX <= slideProfile[i + 1].x) {
          left = slideProfile[i];
          right = slideProfile[i + 1];
          break;
        }
      }

      const span = Math.max(right.x - left.x, 0.0001);
      const t = THREE.MathUtils.clamp((profileX - left.x) / span, 0, 1);
      const profileY = THREE.MathUtils.lerp(left.y, right.y, t);
      const slope = (right.y - left.y) / span;
      const widthTangent = row.right.clone()
        .multiplyScalar(SLIDE_HORIZONTAL_SCALE)
        .addScaledVector(row.up, slope)
        .normalize();
      const normal = new THREE.Vector3().crossVectors(row.forward, widthTangent).normalize();
      if (normal.dot(row.up) < 0) normal.negate();

      const point = row.point.clone()
        .addScaledVector(row.right, lateral)
        .addScaledVector(row.up, profileY);

      return { point, normal, widthTangent, lateralOverflow };
    }

    function makeContactShadowTexture(size = 256) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createRadialGradient(
        size * 0.5, size * 0.5, size * 0.05,
        size * 0.5, size * 0.5, size * 0.5
      );
      gradient.addColorStop(0, "rgba(0, 0, 0, 0.85)");
      gradient.addColorStop(0.48, "rgba(0, 0, 0, 0.35)");
      gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.needsUpdate = true;
      return texture;
    }

    function frameCameraToBall(immediate) {
      if (immediate) {
        camera.position.copy(ballPosition).add(cameraOffset);
        controls.target.copy(ballPosition);
        controls.update();
        return;
      }

      desiredCameraPosition.copy(controls.target).lerp(ballPosition, 0.095);
      cameraFollowDelta.copy(desiredCameraPosition).sub(controls.target);
      camera.position.add(cameraFollowDelta);
      controls.target.copy(desiredCameraPosition);
    }

    function estimateProgress(position) {
      if (trackSamples.length === 0 || totalTrackLength <= 0) return 0;
      let closestDistanceSq = Infinity;
      let closestTrackDistance = 0;

      const step = Math.max(1, Math.floor(trackSamples.length / 240));
      for (let i = 0; i < trackSamples.length; i += step) {
        const sample = trackSamples[i];
        const d = sample.point.distanceToSquared(position);
        if (d < closestDistanceSq) {
          closestDistanceSq = d;
          closestTrackDistance = sample.distance;
        }
      }
      return THREE.MathUtils.clamp(closestTrackDistance / totalTrackLength, 0, 1);
    }

    function makeCheckerTexture(size = 1024, cellsX = 16, cellsY = 8) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size / 2;
      const ctx = canvas.getContext("2d");
      const w = canvas.width / cellsX;
      const h = canvas.height / cellsY;
      for (let y = 0; y < cellsY; y++) {
        for (let x = 0; x < cellsX; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? "#f2f3f2" : "#151817";
          ctx.fillRect(x * w, y * h, w + 1, h + 1);
        }
      }
      ctx.strokeStyle = "rgba(0,0,0,0.18)";
      ctx.lineWidth = 3;
      for (let x = 0; x <= cellsX; x++) {
        ctx.beginPath();
        ctx.moveTo(x * w, 0);
        ctx.lineTo(x * w, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= cellsY; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * h);
        ctx.lineTo(canvas.width, y * h);
        ctx.stroke();
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      return texture;
    }

    function loadTexture(loader, url) {
      return new Promise((resolve, reject) => {
        loader.load(url, resolve, undefined, reject);
      });
    }

    async function addSkySphere() {
      const exrLoader = new EXRLoader();
      try {
        const skyTexture = await loadTexture(exrLoader, "./assets/sky/kloofendal_48d_partly_cloudy_puresky_1k.exr");
        skyTexture.mapping = THREE.EquirectangularReflectionMapping;
        skyTexture.colorSpace = THREE.LinearSRGBColorSpace;
        skyTexture.wrapS = THREE.RepeatWrapping;
        skyTexture.repeat.x = -1;
        skyTexture.offset.x = 1;
        skyTexture.needsUpdate = true;

        scene.environment = skyTexture;
        skyReflectionBackground = skyTexture;

        const skySphere = new THREE.Mesh(
          new THREE.SphereGeometry(420, 64, 32),
          new THREE.MeshBasicMaterial({
            map: skyTexture,
            side: THREE.BackSide,
            fog: false,
            depthWrite: false
          })
        );
        skySphere.renderOrder = -100;
        scene.add(skySphere);
      } catch (error) {
        console.warn("Could not load sky sphere texture.", error);
      }
    }

    async function loadSlidePbrMaps() {
      const textureLoader = new THREE.TextureLoader();
      const exrLoader = new EXRLoader();
      const basePath = "./assets/wood_slide.blend/textures/";

      try {
        const [map, roughnessMap, displacementMap, normalMap] = await Promise.all([
          loadTexture(textureLoader, `${basePath}wood_table_001_diff_1k.jpg`),
          loadTexture(textureLoader, `${basePath}wood_table_001_rough_1k.jpg`),
          loadTexture(textureLoader, `${basePath}wood_table_001_disp_1k.png`),
          loadTexture(exrLoader, `${basePath}wood_table_001_nor_gl_1k.exr`)
        ]);

        configurePbrTexture(map, { colorSpace: THREE.SRGBColorSpace, rotation: SLIDE_TEXTURE_ROTATION });
        configurePbrTexture(roughnessMap, { rotation: SLIDE_TEXTURE_ROTATION });
        configurePbrTexture(displacementMap, { rotation: SLIDE_TEXTURE_ROTATION });
        configurePbrTexture(normalMap, { rotation: SLIDE_TEXTURE_ROTATION });

        return { map, roughnessMap, displacementMap, normalMap };
      } catch (error) {
        console.warn("Could not load slide PBR maps; using procedural fallback.", error);
        return { map: makeSlideTexture() };
      }
    }

    async function loadBallPbrMaps() {
      const textureLoader = new THREE.TextureLoader();
      const exrLoader = new EXRLoader();
      const basePath = "./assets/marble_ball.blend/textures/";

      try {
        const [map, roughnessMap, displacementMap, normalMap] = await Promise.all([
          loadTexture(textureLoader, `${basePath}marble_mosaic_tiles_diff_1k.jpg`),
          loadTexture(exrLoader, `${basePath}marble_mosaic_tiles_rough_1k.exr`),
          loadTexture(textureLoader, `${basePath}marble_mosaic_tiles_disp_1k.png`),
          loadTexture(exrLoader, `${basePath}marble_mosaic_tiles_nor_gl_1k.exr`)
        ]);

        configurePbrTexture(map, { colorSpace: THREE.SRGBColorSpace });
        configurePbrTexture(roughnessMap);
        configurePbrTexture(displacementMap);
        configurePbrTexture(normalMap);

        return { map, roughnessMap, displacementMap, normalMap };
      } catch (error) {
        console.warn("Could not load ball PBR maps; using checker fallback.", error);
        return { map: makeCheckerTexture() };
      }
    }

    function configurePbrTexture(texture, { colorSpace = THREE.NoColorSpace, rotation = 0 } = {}) {
      texture.colorSpace = colorSpace;
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(1, 1);
      texture.center.set(0.5, 0.5);
      texture.rotation = rotation;
      texture.flipY = false;
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      texture.needsUpdate = true;
    }

    function addBallReflectionShader(material) {
      material.onBeforeCompile = (shader) => {
        shader.uniforms.reflectedBallPosition = { value: ballPosition };
        shader.uniforms.reflectedBallRadius = { value: ballRadius };
        shader.uniforms.reflectedBallStrength = { value: 0.22 };
        shader.uniforms.reflectedBallMap = { value: ballPbrMaps.map };
        shader.uniforms.reflectedBallQuaternion = { value: ballMesh.quaternion };

        shader.vertexShader = shader.vertexShader
          .replace(
            "#include <common>",
            "#include <common>\nvarying vec3 vSlideWorldPosition;"
          )
          .replace(
            "#include <project_vertex>",
            "vSlideWorldPosition = (modelMatrix * vec4(transformed, 1.0)).xyz;\n#include <project_vertex>"
          );

        shader.fragmentShader = shader.fragmentShader
          .replace(
            "#include <common>",
            `#include <common>
varying vec3 vSlideWorldPosition;
uniform vec3 reflectedBallPosition;
uniform float reflectedBallRadius;
uniform float reflectedBallStrength;
uniform sampler2D reflectedBallMap;
uniform vec4 reflectedBallQuaternion;

float reflectedSphereHit(vec3 origin, vec3 rayDirection, vec3 sphereCenter, float sphereRadius, out vec3 hitNormal) {
  vec3 offset = origin - sphereCenter;
  float b = dot(offset, rayDirection);
  float c = dot(offset, offset) - sphereRadius * sphereRadius;
  float h = b * b - c;
  if (h <= 0.0) {
    hitNormal = vec3(0.0, 1.0, 0.0);
    return 0.0;
  }
  float t = -b - sqrt(h);
  if (t <= 0.0) {
    hitNormal = vec3(0.0, 1.0, 0.0);
    return 0.0;
  }
  vec3 hitPoint = origin + rayDirection * t;
  hitNormal = normalize(hitPoint - sphereCenter);
  float edge = smoothstep(0.0, 0.32, h / (sphereRadius * sphereRadius));
  float distanceFade = 1.0 / (1.0 + t * 0.18);
  return edge * distanceFade;
}

vec3 inverseQuaternionRotate(vec3 value, vec4 q) {
  vec3 invQ = -q.xyz;
  return value + 2.0 * cross(invQ, cross(invQ, value) + q.w * value);
}

vec2 sphereUvFromNormal(vec3 normalDirection) {
  float u = atan(normalDirection.z, -normalDirection.x) / 6.28318530718;
  float v = 1.0 - acos(clamp(normalDirection.y, -1.0, 1.0)) / 3.14159265359;
  return vec2(fract(u), clamp(v, 0.0, 1.0));
}

vec3 reflectedSrgbToLinear(vec3 color) {
  return mix(
    pow(color * 0.9478672986 + vec3(0.0521327014), vec3(2.4)),
    color * 0.0773993808,
    vec3(lessThanEqual(color, vec3(0.04045)))
  );
}

vec3 reflectedBallColor(vec3 sphereNormal) {
  vec3 localNormal = normalize(inverseQuaternionRotate(sphereNormal, reflectedBallQuaternion));
  vec3 ballTexel = texture2D(reflectedBallMap, sphereUvFromNormal(localNormal)).rgb;
  return reflectedSrgbToLinear(ballTexel);
}`
          )
          .replace(
            "#include <opaque_fragment>",
            `vec3 slideWorldNormal = normalize(inverseTransformDirection(normal, viewMatrix));
vec3 slideViewRay = normalize(vSlideWorldPosition - cameraPosition);
vec3 slideReflectionRay = normalize(reflect(slideViewRay, slideWorldNormal));
vec3 reflectedBallNormal;
float reflectedBallHit = reflectedSphereHit(
  vSlideWorldPosition + slideWorldNormal * 0.04,
  slideReflectionRay,
  reflectedBallPosition,
  reflectedBallRadius * 1.08,
  reflectedBallNormal
);
outgoingLight += reflectedBallColor(reflectedBallNormal) * reflectedBallHit * reflectedBallStrength;
#include <opaque_fragment>`
          );
      };
      material.customProgramCacheKey = () => "slide-ball-ray-reflection-v2";
      return material;
    }

    function makeSlideMaterial() {
      return addBallReflectionShader(new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        map: slidePbrMaps.map,
        roughnessMap: slidePbrMaps.roughnessMap,
        normalMap: slidePbrMaps.normalMap,
        displacementMap: slidePbrMaps.displacementMap,
        displacementScale: slidePbrMaps.displacementMap ? 0.045 : 0,
        displacementBias: slidePbrMaps.displacementMap ? -0.015 : 0,
        normalScale: new THREE.Vector2(0.8, 0.8),
        envMap: slideReflectionTarget.texture,
        envMapIntensity: 0.28,
        roughness: 0.88,
        metalness: 0,
        clearcoat: 0.14,
        clearcoatRoughness: 0.48,
        reflectivity: 0.28,
        side: THREE.DoubleSide
      }));
    }

    function makeBallMaterial() {
      return new THREE.MeshStandardMaterial({
        color: 0xffffff,
        map: ballPbrMaps.map,
        roughnessMap: ballPbrMaps.roughnessMap,
        normalMap: ballPbrMaps.normalMap,
        displacementMap: ballPbrMaps.displacementMap,
        displacementScale: ballPbrMaps.displacementMap ? 0.018 : 0,
        displacementBias: ballPbrMaps.displacementMap ? -0.006 : 0,
        normalScale: new THREE.Vector2(0.45, 0.45),
        roughness: 0.36,
        metalness: 0.01
      });
    }

    function makeSlideTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#d8f1ff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let x = 0; x < canvas.width; x += 32) {
        ctx.fillStyle = x % 64 === 0 ? "rgba(255,255,255,0.22)" : "rgba(12,56,86,0.08)";
        ctx.fillRect(x, 0, 16, canvas.height);
      }
      ctx.strokeStyle = "rgba(7, 48, 72, 0.16)";
      ctx.lineWidth = 2;
      for (let y = 22; y < canvas.height; y += 46) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y + 8 * Math.sin(y));
        ctx.stroke();
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(1, 1);
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return texture;
    }

    function disposeObject(object) {
      object.traverse?.((child) => {
        child.geometry?.dispose();
        if (Array.isArray(child.material)) {
          child.material.forEach((material) => {
            if (!material.userData.reusable) material.dispose();
          });
        } else if (!child.material?.userData.reusable) {
          child.material?.dispose();
        }
      });
    }

    addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    });
  </script>
</body>
</html>
